name: Recherche quotidienne d'offres d'emploi

on:
  schedule:
    # Tous les jours de la semaine à 6h UTC (7h Paris heure d'hiver, 8h en été)
    - cron: "0 6 * * 1-5"
  # Permet de lancer manuellement depuis l'onglet Actions de GitHub
  workflow_dispatch:

jobs:
  job-search:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lancer la recherche et envoyer l'email
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scripts/job_search.py
